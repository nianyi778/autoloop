[loop]
max_rounds = 5
max_inner_rounds = 3
pass_threshold = 0.8
history_summary_max_tokens = 200

[llm]
default_model = "anthropic/claude-sonnet-4-6"
temperature = 0.7

[llm.roles]
evaluator = "anthropic/claude-opus-4-6"
parser    = "anthropic/claude-haiku-4-5-20251001"

[llm.modules]
content_writer = "anthropic/claude-haiku-4-5-20251001"

[evaluator]
checklist_parallel = true
